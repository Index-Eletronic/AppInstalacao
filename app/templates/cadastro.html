{% extends "base.html" %}

{% block content %}
<div class="card">
    <h1>Cadastro</h1>

    <form method="post" action="/cadastro">
        <input type="text" name="cpf" id="cpf_cadastro" placeholder="CPF" required onblur="consultarCpfCadastro()">

        <div id="cpf-consulta-box" class="consulta-box" style="display: none;">
            <p id="cpf-consulta-mensagem"></p>
        </div>

        {% if funcionario_nome %}
        <div class="consulta-box">
            <p><strong>Funcionário encontrado:</strong> {{ funcionario_nome }}</p>
        </div>
        {% endif %}

        <input type="password" name="senha" placeholder="Criar senha" required>
        <input type="password" name="confirmar_senha" placeholder="Confirmar senha" required>
        <button type="submit">Cadastrar</button>
    </form>

    {% if erro %}
    <p class="erro">{{ erro }}</p>
    {% endif %}

    {% if sucesso %}
    <p class="sucesso">{{ sucesso }}</p>
    {% endif %}

    <a href="/login">Voltar ao login</a>
</div>
{% endblock %}
