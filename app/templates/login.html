{% extends "base.html" %}

{% block content %}
<div class="card">
    <h1>Login</h1>

    <form method="post" action="/login">
        <input type="text" name="cpf" id="cpf_login" placeholder="CPF" required maxlength="14">
        <input type="password" name="senha" placeholder="Senha" required>
        <button type="submit">Entrar</button>
    </form>

    {% if erro %}
    <p class="erro">{{ erro }}</p>
    {% endif %}

    <a href="/cadastro">Ir para cadastro</a>
</div>
{% endblock %}
